services:
  llm-proxy:
    build:
      context: .
      dockerfile: build/Dockerfile
    container_name: llm-proxy-${ENVIRONMENT:-dev}
    ports:
      - "${LLM_PROXY_PORT:-9002}:9002"
    volumes:
      - .:/app
      - /app/bin
      - ./data:/app/data
      - ./logs:/app/logs
    working_dir: /app
    command: ["go", "run", "./cmd/llm-proxy"]
    environment:
      - PORT=9002
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9002/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - llm-proxy-network

networks:
  llm-proxy-network:
    driver: bridge
